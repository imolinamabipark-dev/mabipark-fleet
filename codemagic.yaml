workflows:
  android-apk:
    name: Mabipark Fleet — Android APK
    max_build_duration: 30
    environment:
      java: 17
      node: 20
    scripts:
      - name: Instalar dependencias
        script: npm install

      - name: Copiar socket.io a www/js
        script: node scripts/copy-vendor.js

      - name: Agregar plataforma Android
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar web con Android
        script: npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - tu-email@gmail.com
        notify:
          success: true
          failure: true
